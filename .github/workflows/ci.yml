# Workflow de CI do projeto FoodSafetyTracker.
# Executa automaticamente o build e os testes a cada push ou pull request no branch main.
# Garante que o projeto compila e todos os testes passam antes de integrar o código.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build in Release configuration
        run: dotnet build --configuration Release --no-restore

      - name: Run all xUnit tests
        run: dotnet test --configuration Release --no-build --verbosity normal